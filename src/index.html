<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tiny Doodle</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="titlebar">
    <span id="titlebar-label">Tiny Doodle</span>
    <div id="titlebar-controls">
      <button id="pinBtn" class="titlebar-btn" title="Keep on top">📌</button>
      <button id="minBtn" class="titlebar-btn" title="Minimize">—</button>
      <button id="closeBtn" class="titlebar-btn close" title="Close">✕</button>
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="board"></canvas>
  </div>

  <div id="toolbar">
    <div class="row">
      <button id="undoBtn" class="tool-btn" title="Undo (Ctrl+Z)" disabled>↩</button>
      <button id="redoBtn" class="tool-btn" title="Redo (Ctrl+Y)" disabled>↪</button>
      <button id="penTool" class="tool-btn active" title="Pen">✏️</button>
      <button id="eraserTool" class="tool-btn" title="Eraser">🧽</button>
      <button id="clearBtn" class="tool-btn" title="Clear canvas">🗑️</button>
      <button id="moreBtn" class="tool-btn" title="More options">⋯</button>
    </div>

    <div id="panel" class="panel hidden">
      <label class="panel-label">Size <span id="sizeVal">4</span>px</label>
      <input type="range" id="sizeSlider" min="1" max="60" value="4" />

      <label class="panel-label">Opacity <span id="opacityVal">100</span>%</label>
      <input type="range" id="opacitySlider" min="5" max="100" value="100" />

      <label class="panel-label">Color</label>
      <div id="swatches">
        <button class="swatch active" style="background:#f5f5f5" data-color="#f5f5f5"></button>
        <button class="swatch" style="background:#ff5c5c" data-color="#ff5c5c"></button>
        <button class="swatch" style="background:#ffb84c" data-color="#ffb84c"></button>
        <button class="swatch" style="background:#ffe34c" data-color="#ffe34c"></button>
        <button class="swatch" style="background:#5cff8f" data-color="#5cff8f"></button>
        <button class="swatch" style="background:#4cc9ff" data-color="#4cc9ff"></button>
        <button class="swatch" style="background:#8f7bff" data-color="#8f7bff"></button>
        <button class="swatch" style="background:#ff7bd0" data-color="#ff7bd0"></button>
        <input type="color" id="customColor" value="#f5f5f5" title="Custom color" />
      </div>

      <label class="panel-label">Background</label>
      <div id="bgSwatches">
        <button class="bg-swatch active" data-bg="dark" title="Dark background"></button>
        <button class="bg-swatch" data-bg="white" title="White background"></button>
      </div>
    </div>
  </div>

  <div id="resizeHandle"></div>

  <script src="renderer.js"></script>
</body>
</html>
